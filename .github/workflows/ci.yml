name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend (Astro)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run lint:frontend

      - run: npm run check:frontend

      - run: npm run format:check --workspace=apps/frontend

      - run: npm run build:frontend

  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    env:
      DJANGO_SECRET_KEY: ci-dummy-key-not-for-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt

      - run: python -m venv apps/backend/.venv

      - run: apps/backend/.venv/bin/python -m pip install -r apps/backend/requirements.txt

      - run: apps/backend/.venv/bin/ruff check apps/backend

      - run: apps/backend/.venv/bin/ruff format --check apps/backend

      - run: apps/backend/.venv/bin/python apps/backend/manage.py check
